services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: maofu_crm_main:latest
    container_name: maofu_crm_main
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3001"
    environment:
      DATABASE_URL: file:/data/prod.db
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      AUTO_SEED: ${AUTO_SEED:-false}
      INIT_DB: ${INIT_DB:-false}
      RUN_SYNC: ${RUN_SYNC:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      NODE_ENV: production
      PORT: 3001
    volumes:
      - ${DATA_DIR:-/data/service/maofu/maofu_crm/maofu_crm_data}/db:/data
      - ${DATA_DIR:-/data/service/maofu/maofu_crm/maofu_crm_data}/uploads:/app/data/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
