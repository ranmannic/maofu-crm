services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maofu-crm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/data/prod.db
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - maofu-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    profiles: ["nginx"]
    image: nginx:1.27-alpine
    container_name: maofu-crm-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  maofu-data:
    name: maofu-crm-data
